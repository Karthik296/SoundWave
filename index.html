<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/soundwave-logo.png" />
  <link rel="apple-touch-icon" href="/soundwave-apple.png" />
  <meta name="theme-color" content="#000000" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="SoundWave - Your music, your way. Stream millions of songs in Hindi, Telugu, Tamil, Kannada, and more." />
  <title>SoundWave - Music Streaming</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- PWA Crash Auto-Recovery Script -->
  <script>
    setTimeout(() => {
      const root = document.getElementById('root');
      if (!root || root.innerHTML.trim() === '') {
        // App crashed before rendering. Show fallback recovery UI.
        document.body.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#000;color:#fff;font-family:sans-serif;text-align:center;padding:20px;">
            <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
            <h2 style="margin-bottom:8px;">SoundWave encountered an error</h2>
            <p style="color:#b3b3b3;margin-bottom:24px;max-width:400px;">
              An old cached version of the app may be crashing. Please update to the latest version to continue.
            </p>
            <button 
              style="padding:12px 24px;background:#1db954;color:#000;border:none;border-radius:24px;font-size:16px;font-weight:bold;cursor:pointer;"
              onclick="navigator.serviceWorker.getRegistrations().then(regs => { for(let r of regs) r.unregister(); window.location.reload(true); })"
            >
              Force Update & Reload
            </button>
          </div>
        `;
      }
    }, 4000);
  </script>
</body>

</html>
